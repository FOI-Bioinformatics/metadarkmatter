# Pre-commit hooks for metadarkmatter.
#
# Install once with:  uv run pre-commit install
# Run on all files:   uv run pre-commit run --all-files
#
# These mirror the CI gates (ruff + mypy) so issues are caught locally
# before they reach a pull request.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format
        # Formatting is advisory here; the project does not yet enforce
        # ruff-format in CI, so run it but do not fail the commit on it.
        stages: [manual]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^src/metadarkmatter/
        additional_dependencies:
          - pydantic>=2.5.0
        # Use the project's mypy config (strict + the curated disable list).
        args: ["--config-file=pyproject.toml"]
